<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strong Random Password Generator | Free Secure Password 2026</title>
    <meta name="description" content="Free online strong random password generator, create 12/16/24 length secure passwords instantly. No download, no registration.">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4182465888243941" crossorigin="anonymous"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{background:#f0f4f8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
        .card{background:#fff;padding:40px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08);max-width:500px;width:100%}
        h1{color:#1e293b;text-align:center;margin-bottom:24px}
        .result{background:#f8fafc;padding:16px;border-radius:8px;font-size:22px;letter-spacing:1px;text-align:center;margin-bottom:20px;color:#1e293b}
        .btn{width:100%;background:#0066cc;color:#fff;border:none;padding:16px;border-radius:8px;font-size:18px;cursor:pointer;margin-top:10px}
    </style>
</head>
<body>
    <div class="card">
        <h1>Strong Password Generator</h1>
        <div class="result" id="result"></div>
        <button class="btn" onclick="generate()">Generate Password</button>
    </div>
    <script>
        function generate(){
            const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;:,.<>?";
            let pwd="";
            for(let i=0;i<16;i++)pwd+=chars[Math.floor(Math.random()*chars.length)];
            document.getElementById("result").textContent=pwd;
        }
        generate();
    </script>
</body>
</html>
