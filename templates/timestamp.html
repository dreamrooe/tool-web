<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unix Timestamp Converter | Online Time Stamp Tool</title>
    <meta name="description" content="Free online unix timestamp converter, convert timestamp to human readable date and vice versa.">
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
        body {background:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
        .container {background:#fff;padding:40px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08);max-width:600px;width:100%;}
        h1 {color:#1e293b;text-align:center;margin-bottom:30px;font-size:28px;}
        .input-box {margin:20px 0;}
        label {display:block;color:#475569;margin-bottom:8px;font-size:16px;}
        input {width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:8px;font-size:16px;}
        .btn {width:100%;background:#0066cc;color:#fff;border:none;padding:14px;border-radius:8px;font-size:18px;cursor:pointer;margin:10px 0;}
        .result-box {background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:16px;margin-top:20px;}
    </style>
</head>
<body>
    <div class="container">
        <h1>Unix Timestamp Converter</h1>
        <div class="input-box">
            <label>Current Timestamp:</label>
            <input type="text" value="{{ now_ts }}" readonly>
        </div>
        <div class="input-box">
            <label>Enter Timestamp to Convert:</label>
            <input type="text" id="tsInput" placeholder="e.g. 1710000000">
            <button class="btn" onclick="convertTs()">Convert to Date</button>
        </div>
        <div class="result-box" id="result"></div>
    </div>

    <script>
        function convertTs() {
            const ts = document.getElementById('tsInput').value;
            if(!ts) return;
            const date = new Date(parseInt(ts) * 1000);
            document.getElementById('result').innerHTML = `
                <p>UTC: ${date.toUTCString()}</p>
                <p>Local Time: ${date.toString()}</p>
            `;
        }
    </script>
</body>
</html>
