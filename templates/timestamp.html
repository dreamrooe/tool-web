<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unix Timestamp Converter | Online Time Tool</title>
    <meta name="description" content="Free online Unix timestamp converter, convert timestamp to human readable time and vice versa instantly.">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4182465888243941" crossorigin="anonymous"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{background:#f0f4f8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
        .container{background:#fff;padding:40px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08);max-width:600px;width:100%}
        h1{color:#1e293b;text-align:center;margin-bottom:30px}
        .ad-banner{margin:20px 0;text-align:center}
        .box{margin:12px 0}
        label{font-weight:bold;color:#334155}
        input{width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:8px;font-size:16px;margin-top:6px}
        .btn{width:100%;background:#0066cc;color:#fff;border:none;padding:14px;border-radius:8px;font-size:18px;cursor:pointer;margin-top:10px}
        .reverse-btn{background:#22c55e;margin-top:15px}
        .current-btn{background:#f59e0b;margin-top:15px}
        footer{text-align:center;margin-top:20px;color:#64748b;font-size:14px}
    </style>
</head>
<body>
    <div class="container">
        <h1>Unix Timestamp Converter</h1>
        
        <div class="ad-banner">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-4182465888243941"
                 data-ad-slot="1234567890"  <!-- 替换为你的AdSense广告位ID -->
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

        <div class="box">
            <label>Unix Timestamp</label>
            <input type="text" id="ts" placeholder="Enter timestamp (e.g., 1775157651)">
        </div>
        <button class="btn" onclick="convertToDateTime()">Convert to Date Time</button>
        <button class="btn current-btn" onclick="fillCurrentTimestamp()">Current Timestamp</button>
        
        <div class="box" style="margin-top:20px">
            <label>Date Time</label>
            <input type="text" id="dt-input" placeholder="Enter date time (e.g., 2024-08-01 12:00:00)">
        </div>
        <button class="btn reverse-btn" onclick="convertToTimestamp()">Convert to Timestamp</button>
        
        <div class="box" style="margin-top:20px">
            <label>Result</label>
            <input type="text" id="result" readonly>
        </div>

        <footer>
            <p>This site uses Google Adsense. Ads may be personalized based on your browsing history.</p>
            <p><a href="/privacy-policy" style="color:#0066cc">Privacy Policy</a> | <a href="/terms-of-service" style="color:#0066cc">Terms of Service</a></p>
        </footer>
    </div>

    <script>
        // Convert timestamp to date time
        function convertToDateTime(){
            const t=document.getElementById("ts").value;
            if(!t || isNaN(t)){
                alert("Please enter a valid number!");
                return;
            }
            const d=new Date(parseInt(t)*1000);
            document.getElementById("result").value=d.toLocaleString();
        }

        // Convert date time to timestamp
        function convertToTimestamp(){
            const dt=document.getElementById("dt-input").value;
            if(!dt){
                alert("Please enter a valid date time!");
                return;
            }
            const timestamp = Math.floor(new Date(dt).getTime() / 1000);
            if(isNaN(timestamp)){
                alert("Invalid date time format! Use format like 2024-08-01 12:00:00");
                return;
            }
            document.getElementById("result").value=timestamp;
        }

        // Fill current timestamp
        function fillCurrentTimestamp(){
            const currentTs = Math.floor(Date.now() / 1000);
            document.getElementById("ts").value=currentTs;
            convertToDateTime();
        }
    </script>
</body>
</html>
