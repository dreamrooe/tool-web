<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unix Timestamp Converter | Online Time Tool</title>
    <meta name="description" content="Free online Unix timestamp converter, convert timestamp to human readable time and vice versa instantly.">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4182465888243941" crossorigin="anonymous"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{background:#f0f4f8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
        .container{background:#fff;padding:40px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08);max-width:600px;width:100%}
        h1{color:#1e293b;text-align:center;margin-bottom:30px}
        .box{margin:12px 0}
        label{font-weight:bold;color:#334155}
        input{width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:8px;font-size:16px;margin-top:6px}
        .btn{width:100%;background:#0066cc;color:#fff;border:none;padding:14px;border-radius:8px;font-size:18px;cursor:pointer;margin-top:10px}
    </style>
</head>
<body>
    <div class="container">
        <h1>Unix Timestamp Converter</h1>
        <div class="box">
            <label>Unix Timestamp</label>
            <input type="text" id="ts" placeholder="Enter timestamp">
        </div>
        <button class="btn" onclick="convert()">Convert to Date Time</button>
        <div class="box">
            <label>Date Time Result</label>
            <input type="text" id="dt" readonly>
        </div>
    </div>
    <script>
        function convert(){
            const t=document.getElementById("ts").value;
            if(!t)return;
            const d=new Date(parseInt(t)*1000);
            document.getElementById("dt").value=d.toLocaleString();
        }
    </script>
</body>
</html>
