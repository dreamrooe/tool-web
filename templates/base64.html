<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encoder Decoder | Online Base64 Tool</title>
    <meta name="description" content="Free online Base64 encoder and decoder, encode text to Base64 and decode Base64 to text instantly.">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4182465888243941" crossorigin="anonymous"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{background:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .container{background:#fff;padding:40px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08);max-width:600px;width:100%}
        h1{color:#1e293b;text-align:center;margin-bottom:30px;font-size:28px}
        .ad-banner{margin:20px 0;text-align:center}
        textarea{width:100%;height:120px;padding:12px;border:1px solid #e2e8f0;border-radius:8px;font-size:16px;margin:10px 0;resize:vertical}
        .btn-group{display:flex;gap:10px;margin:10px 0}
        .btn{flex:1;background:#0066cc;color:#fff;border:none;padding:14px;border-radius:8px;font-size:18px;cursor:pointer}
        .btn.green{background:#22c55e}
        .btn.copy{background:#f59e0b;flex:100%;margin-top:10px}
        footer{text-align:center;margin-top:20px;color:#64748b;font-size:14px}
    </style>
</head>
<body>
    <div class="container">
        <h1>Base64 Encoder & Decoder</h1>
        
        <div class="ad-banner">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-4182465888243941"
                 data-ad-slot="1234567890"  <!-- 替换为你的AdSense广告位ID -->
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

        <textarea id="inputText" placeholder="Enter text or Base64 here..."></textarea>
        <div class="btn-group">
            <button class="btn" onclick="encode()">Encode to Base64</button>
            <button class="btn green" onclick="decode()">Decode from Base64</button>
        </div>
        <textarea id="outputText" placeholder="Result will show here..." readonly></textarea>
        <button class="btn copy" onclick="copyResult()">Copy Result</button>

        <footer>
            <p>This site uses Google Adsense. Ads may be personalized based on your browsing history.</p>
            <p><a href="/privacy-policy" style="color:#0066cc">Privacy Policy</a> | <a href="/terms-of-service" style="color:#0066cc">Terms of Service</a></p>
        </footer>
    </div>

    <script>
        function encode(){
            const input = document.getElementById("inputText").value;
            if(!input){
                alert("Please enter text to encode!");
                return;
            }
            document.getElementById("outputText").value=btoa(unescape(encodeURIComponent(input)));
        }
        
        function decode(){
            try{
                const input = document.getElementById("inputText").value;
                if(!input){
                    alert("Please enter Base64 to decode!");
                    return;
                }
                document.getElementById("outputText").value=decodeURIComponent(escape(atob(input)));
            }catch(e){
                alert("Invalid Base64 format!");
            }
        }

        function copyResult() {
            const output = document.getElementById("outputText");
            if(!output.value){
                alert("Generate a result first!");
                return;
            }
            navigator.clipboard.writeText(output.value);
            alert("Result copied to clipboard!");
        }
    </script>
</body>
</html>
