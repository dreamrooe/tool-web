<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encoder Decoder | Online Base64 Tool</title>
    <meta name="description" content="Free online Base64 encoder and decoder, encode text to Base64 and decode Base64 to text instantly.">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4182465888243941" crossorigin="anonymous"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{background:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .container{background:#fff;padding:40px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08);max-width:600px;width:100%}
        h1{color:#1e293b;text-align:center;margin-bottom:30px;font-size:28px}
        textarea{width:100%;height:120px;padding:12px;border:1px solid #e2e8f0;border-radius:8px;font-size:16px;margin:10px 0;resize:vertical}
        .btn-group{display:flex;gap:10px;margin:10px 0}
        .btn{flex:1;background:#0066cc;color:#fff;border:none;padding:14px;border-radius:8px;font-size:18px;cursor:pointer}
        .btn.green{background:#22c55e}
    </style>
</head>
<body>
    <div class="container">
        <h1>Base64 Encoder & Decoder</h1>
        <textarea id="inputText" placeholder="Enter text or Base64 here..."></textarea>
        <div class="btn-group">
            <button class="btn" onclick="encode()">Encode</button>
            <button class="btn green" onclick="decode()">Decode</button>
        </div>
        <textarea id="outputText" placeholder="Result will show here..." readonly></textarea>
    </div>
    <script>
        function encode(){document.getElementById("outputText").value=btoa(document.getElementById("inputText").value)}
        function decode(){try{document.getElementById("outputText").value=atob(document.getElementById("inputText").value)}catch(e){alert("Invalid Base64!")}}
    </script>
</body>
</html>
